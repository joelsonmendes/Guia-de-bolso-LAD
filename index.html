<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071a33" />
  <title>LAD Pocket Pro Siemens V3</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/logo_senai_hub.webp" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <img src="assets/logo_senai_hub.webp" alt="SENAI HUB" class="brand-logo" />
        <div>
          <strong>LAD Pocket Pro</strong>
          <span>Siemens V3</span>
        </div>
      </div>
      <nav class="main-nav" id="mainNav" aria-label="Menu principal">
        <button data-view="home" class="active">Início</button>
        <button data-view="patterns">Padrões LAD</button>
        <button data-view="newProject">Projeto Novo</button>
        <button data-view="tags">Banco de Tags</button>
        <button data-view="tia">TIA Portal</button>
        <button data-view="hmi">IHM Siemens</button>
        <button data-view="drive">Inversor Siemens</button>
        <button data-view="simulator">Simulador</button>
        <button data-view="assistant">Assistente Siemens Pro</button>
        <button data-view="favorites">Favoritos</button>
        <button data-view="about">Sobre</button>
      </nav>
      <div class="sidebar-footer">
        <span class="status-dot"></span>
        PWA offline habilitado
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">☰</button>
        <div>
          <p class="eyebrow">SENAI HUB · Inovação e Tecnologia</p>
          <h1 id="pageTitle">LAD Pocket Pro Siemens</h1>
        </div>
        <button class="install-btn" id="installBtn" hidden>Instalar App</button>
      </header>

      <section id="appView" class="view"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
